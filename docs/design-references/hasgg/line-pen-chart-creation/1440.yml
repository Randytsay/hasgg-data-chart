        - generic [ref=e112] [box=12,2591,366,1738]:
          - paragraph [ref=e113] [box=32,2611,326,162]: 可添加拐點的折線圖製作工具是一個便利的在線平台，用戶可輕鬆創建可添加拐點的折線圖，點擊即可添加拐點。無論是用於數據分析、課堂教學還是項目展示，都能夠直觀地展示數據趨勢與波動。使用我們直觀的界面和功能，就能讓您的數據可視化變得簡單而有效！
          - paragraph [box=32,2799,326,0]
          - list [ref=e114] [box=62,2799,296,662]:
            - listitem [ref=e115] [box=62,2799,296,54]: 圖表生成：根據用戶輸入的數據實時生成一個點擊即可添加拐點的折線圖。
            - listitem [ref=e116] [box=62,2857,296,54]: 多主題支持：提供多種主題選擇以美化圖表外觀。
            - listitem [ref=e117] [box=62,2914,296,54]: 數據輸入：通過互動式表格錄入數據，簡單、直觀。
            - listitem [ref=e118] [box=62,2972,296,27]: 數據導入：通過選擇Excel文件導入數據。
            - listitem [ref=e119] [box=62,3003,296,54]: 自定義選項：允許用戶輸入標題、副標題和計量單位，添加附加信息和水印。
            - listitem [ref=e120] [box=62,3061,296,54]: 圖表下載：支持將生成的圖表下載為PNG格式圖片。
            - listitem [ref=e121] [box=62,3118,296,54]: 圖例位置調整：可選擇圖例顯示的位置，包括左側、右側、頂部、底部和隱藏。
            - listitem [ref=e122] [box=62,3176,296,54]: 數據添加和刪除：用戶可以靈活地添加或刪除數據項。
            - listitem [ref=e123] [box=62,3234,296,54]: 自動生成：在頁面載入時自動生成一個示例可添加拐點的折線圖，方便用戶使用。
            - listitem [ref=e124] [box=62,3292,296,54]: 實時預覽：實時查看數據變化對圖表的影響。
            - listitem [ref=e125] [box=62,3349,296,54]: 清除功能：清除所有輸入的數據和選項，重新開始。
            - listitem [ref=e126] [box=62,3407,296,54]: "全程本地處理: 純本地處理，完全安全，無需擔心隱私問題。"
