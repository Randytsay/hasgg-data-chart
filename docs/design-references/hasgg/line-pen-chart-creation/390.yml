          - listitem [ref=e150] [box=110,1831,1290,27]: 自動生成：在頁面載入時自動生成一個示例日曆圖，方便用戶使用。
          - listitem [ref=e151] [box=110,1861,1290,27]: 實時預覽：實時查看數據變化對圖表的影響。
