      - generic [ref=e140] [box=60,1711,1360,1755]:
        - paragraph [ref=e141] [box=80,1731,1320,54]: 可拖拽點的折線圖製作工具是一款用戶友好的在線工具，允許您快速創建並自定義可拖拽點的折線圖，支持互動式數據編輯、豐富的樣式選擇和數據導入。無論您是數據分析師、學生還是企業人士，都能輕鬆利用這一工具將數據可視化，幫助您傳達信息、展示趨勢和進行決策。
        - paragraph [box=80,1811,1320,0]
        - list [ref=e142] [box=110,1811,1290,365]:
          - listitem [ref=e143] [box=110,1811,1290,27]: 圖表生成：根據用戶輸入的數據實時生成可拖拽折線圖。
          - listitem [ref=e144] [box=110,1841,1290,27]: 多主題支持：提供多種主題選擇以美化圖表外觀。
          - listitem [ref=e145] [box=110,1872,1290,27]: 數據輸入：通過互動式表格錄入數據，簡單、直觀。
          - listitem [ref=e146] [box=110,1903,1290,27]: 數據導入：通過選擇Excel文件導入數據。
          - listitem [ref=e147] [box=110,1934,1290,27]: 自定義選項：允許用戶輸入標題、副標題和計量單位，添加附加信息和水印。
          - listitem [ref=e148] [box=110,1964,1290,27]: 圖表下載：支持將生成的圖表下載為PNG格式圖片。
          - listitem [ref=e149] [box=110,1995,1290,27]: 圖例位置調整：可選擇圖例顯示的位置，包括左側、右側、頂部、底部和隱藏。
          - listitem [ref=e150] [box=110,2026,1290,27]: 數據添加和刪除：用戶可以靈活地添加或刪除數據項。
          - listitem [ref=e151] [box=110,2057,1290,27]: 自動生成：在頁面載入時自動生成一個示例可拖拽折線圖，方便用戶使用。
          - listitem [ref=e152] [box=110,2087,1290,27]: 實時預覽：實時查看數據變化對圖表的影響。
          - listitem [ref=e153] [box=110,2118,1290,27]: 清除功能：清除所有輸入的數據和選項，重新開始。
          - listitem [ref=e154] [box=110,2149,1290,27]: "全程本地處理: 純本地處理，完全安全，無需擔心隱私問題。"
