          - listitem [ref=e239] [box=110,1741,1250,27]: 多主題支持：提供多種主題選擇以美化圖表外觀。
          - listitem [ref=e240] [box=110,1772,1250,27]: 數據輸入：通過互動式表格錄入數據，簡單、直觀。
          - listitem [ref=e241] [box=110,1803,1250,27]: 數據導入：通過選擇Excel文件導入數據。
          - listitem [ref=e242] [box=110,1834,1250,27]: 自定義選項：允許用戶輸入標題、副標題、統計維度和計量單位，添加附加信息和水印。
          - listitem [ref=e243] [box=110,1864,1250,27]: 圖表下載：支持將生成的圖表下載為PNG格式圖片。
          - listitem [ref=e244] [box=110,1895,1250,27]: 圖例位置調整：可選擇圖例顯示的位置，包括左側、右側、頂部、底部和隱藏。
