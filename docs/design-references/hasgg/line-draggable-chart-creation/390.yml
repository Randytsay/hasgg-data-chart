      - generic [ref=e235] [box=60,1611,1320,1453]:
        - paragraph [ref=e236] [box=80,1631,1280,54]: 基礎堆疊條形圖歸一化百分比製作工具是一款免費在線工具，用戶可以輕鬆創建、定製和下載歸一化為百分比的基礎堆疊條形圖。支持多種主題和顏色選擇，用戶可以通過填寫數據或選擇Excel表格實時生成專業的圖表，適用於各種行業的數據可視化需求。
        - paragraph [box=80,1711,1280,0]
